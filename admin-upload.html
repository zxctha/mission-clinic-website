<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Upload Portal</title>

    <style>

        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#f1f5f9;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .card{
            width:100%;
            max-width:550px;
            background:white;
            padding:3rem;
            border-radius:32px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        h2{
            color:#0057b8;
            margin-bottom:1rem;
        }

        p{
            color:#64748b;
            margin-bottom:2rem;
        }

        label{
            display:block;
            margin-bottom:.5rem;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:14px;
            border-radius:14px;
            border:1px solid #cbd5e1;
            box-sizing:border-box;
        }

        .group{
            margin-bottom:1.5rem;
        }

        button{
            width:100%;
            padding:18px;
            border:none;
            border-radius:999px;
            background:#f4d64e;
            font-weight:bold;
            cursor:pointer;
            font-size:16px;
            box-shadow:0 5px 15px rgba(0,0,0,0.15);
        }

        #uploadStatus{
            margin-top:2rem;
            text-align:center;
        }

    </style>

</head>

<body>

<div class="card">

    <h2>
        Upload Laboratory Result
    </h2>

    <p>
        Upload patient laboratory PDF result.
    </p>

    <form id="uploadForm">

        <div class="group">

            <label>
                Reference Number
            </label>

            <input
                type="text"
                id="referenceNumber"
                placeholder="ML-177918089858"
                required>

        </div>


<!-- DITO ANG PATIENT INFO -->
<div id="patientInfo" style="
    display:none;
    margin-bottom:1.5rem;
    background:#f8fafc;
    border:1px solid #cbd5e1;
    padding:1rem;
    border-radius:16px;
">

    <div style="margin-bottom:.5rem;">
        <strong>Patient Name:</strong>
        <span id="patientName"></span>
    </div>

    <div style="margin-bottom:.5rem;">
        <strong>Service:</strong>
        <span id="patientService"></span>
    </div>

    <div>
        <strong>Status:</strong>
        <span id="patientStatus"></span>
    </div>

</div>

<div
    class="group"
    id="uploadSection"
    style="display:none;">

    <label>
        Upload PDF Result
    </label>

    <input
        type="file"
        id="resultFile"
        accept=".pdf"
        multiple
        required>

    <div id="fileList" style="
        margin-top:10px;
        font-size:14px;
        color:#475569;
    "></div>

</div>

<button type="submit">
    📄 Upload Result
</button>

</form>

<div id="uploadStatus"></div>

<script>
    
document
.getElementById("referenceNumber")
.addEventListener("change", async function () {

    const reference =
        this.value;

    if(!reference) return;

    try{

        const response =
            await fetch(
                "https://script.google.com/macros/s/AKfycby37SS_0mdKvGBh1Kv79jbUrh0n0wRbRLh9wTjbDxsp1fzr4jkNH-Elc9zRpDRbVso/exec?reference="
                + encodeURIComponent(reference)
            );

        const data =
            await response.json();

        if(data.found){

            document
            .getElementById("patientInfo")
            .style.display = "block";

            document
            .getElementById("uploadSection")
            .style.display = "block";

            document
            .getElementById("patientName")
            .innerText = data.name;

            document
            .getElementById("patientService")
            .innerText = data.service;

            document
            .getElementById("patientStatus")
            .innerText = data.status;

        }

        else{

            document
            .getElementById("patientInfo")
            .style.display = "none";

            document
            .getElementById("uploadSection")
            .style.display = "none";

            alert(
                "Reference number not found."
            );

        }

    }

    catch(err){

        console.log(err);

    }

});


    
document
.getElementById("resultFile")
.addEventListener("change", function(){

    const files = this.files;

    const fileList =
        document.getElementById("fileList");

    if(files.length === 0){

        fileList.innerHTML = "";

        return;

    }

    let html = `
        <div style="
            background:#f8fafc;
            border:1px solid #cbd5e1;
            border-radius:12px;
            padding:12px;
            margin-top:10px;
        ">
            <strong>
                📄 Selected Files (${files.length})
            </strong>

            <ul style="
                margin:10px 0 0;
                padding-left:20px;
            ">
    `;

    for(let i = 0; i < files.length; i++){

        html += `
            <li style="margin-bottom:4px;">
                ${files[i].name}
            </li>
        `;

    }

    html += `
            </ul>
        </div>
    `;

    fileList.innerHTML = html;

});


    
    
document
.getElementById("uploadForm")
.addEventListener("submit", async (e) => {

    e.preventDefault();

    const reference =
        document.getElementById("referenceNumber").value;

    const files =
        document.getElementById("resultFile").files;


const statusBox =
    document.getElementById("uploadStatus");

statusBox.innerHTML =
    "Uploading result...";

const uploadButton =
    document.querySelector("button");

uploadButton.disabled = true;

uploadButton.innerText = "Uploading...";

let uploadedCount = 0;

for(let i = 0; i < files.length; i++){

    const file = files[i];

    const base64File = await new Promise((resolve) => {

        const reader = new FileReader();

        reader.readAsDataURL(file);

        reader.onload = () => {

            resolve(
                reader.result.split(",")[1]
            );

        };

    });

    const payload = {

        action: "uploadResult",

        reference: reference,

        file: base64File,

        fileName: file.name

    };

    await fetch(
        "https://script.google.com/macros/s/AKfycby37SS_0mdKvGBh1Kv79jbUrh0n0wRbRLh9wTjbDxsp1fzr4jkNH-Elc9zRpDRbVso/exec",
        {
            method: "POST",
            body: new URLSearchParams({
                payload: JSON.stringify(payload)
            })
        }
    );

    uploadedCount++;

    statusBox.innerHTML = `
        Uploading ${uploadedCount} of ${files.length} files...
    `;

}

uploadButton.disabled = false;

uploadButton.innerText = "📄 Upload Result";

statusBox.innerHTML = `
    <div style="
        background:#dcfce7;
        color:#166534;
        padding:1rem;
        border-radius:16px;
        font-weight:bold;
    ">
        ✅ All files uploaded successfully.
    </div>
`;

document.getElementById("resultFile").value = "";

document.getElementById("fileList").innerHTML = "";

    
});
        

</script>

    
</body>
</html>

<script defer>

document
.getElementById("uploadForm")
.addEventListener("submit", (e) => {

    e.preventDefault();

    const reference =
        document.getElementById("referenceNumber").value;

    const file =
        document.getElementById("resultFile").files[0];

    const statusBox =
        document.getElementById("uploadStatus");

    statusBox.innerHTML = `
        <div style="
            color:#64748b;
            text-align:center;
        ">
            Uploading result...
        </div>
    `;

    const reader = new FileReader();

    reader.readAsDataURL(file);

    reader.onload = () => {

        const base64File =
            reader.result.split(",")[1];

        const form =
            document.createElement("form");

        form.method = "POST";

        form.action =
            "https://script.google.com/macros/s/AKfycbxMwEpiOgugs48GSzzXE42hpfYKwXBJuV0hPmsfQUMBxuoZFqpJl_Egz9oq0XoGCFI/exec";

        form.target = "hiddenFrame";

        const payload = {

            action: "uploadResult",

            reference: reference,

            file: base64File,

            fileName: file.name

        };

        const input =
            document.createElement("input");

        input.type = "hidden";

        input.name = "data";

        input.value =
            JSON.stringify(payload);

        form.appendChild(input);

        document.body.appendChild(form);

        form.submit();

        statusBox.innerHTML = `

            <div style="
                background:#dcfce7;
                color:#166534;
                padding:1rem;
                border-radius:16px;
                text-align:center;
                font-weight:bold;
            ">

                ✅ Upload completed successfully.

            </div>

        `;

    };

});

</script>

<iframe
    name="hiddenFrame"
    style="display:none;">
</iframe>

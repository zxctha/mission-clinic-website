<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Result Status Checker</title>

    <style>

        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#f1f5f9;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .card{
            width:100%;
            max-width:500px;
            background:white;
            padding:3rem;
            border-radius:32px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        h2{
            color:#0057b8;
            margin-bottom:1rem;
        }

        p{
            color:#64748b;
            margin-bottom:2rem;
        }

        label{
            display:block;
            margin-bottom:.5rem;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:14px;
            border-radius:14px;
            border:1px solid #cbd5e1;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:18px;
            border:none;
            border-radius:999px;
            background:#f4d64e;
            font-weight:bold;
            cursor:pointer;
            font-size:16px;
            box-shadow:0 5px 15px rgba(0,0,0,0.15);
            margin-top:1rem;
        }

        #resultBox{
            margin-top:2rem;
        }

    </style>

</head>

<body>

<div class="card">

    <h2>
        Check Laboratory Result Status
    </h2>

    <p>
        Enter your reference number below.
    </p>

    <label>
        Reference Number
    </label>

    <input
        type="text"
        id="referenceInput"
        placeholder="ML-177918089858">

    <button id="checkStatusBtn">
        Check Status
    </button>

    <div id="resultBox"></div>

</div>

<script>

function handleResult(data) {

    const resultBox =
        document.getElementById("resultBox");

    if (data.found) {

        resultBox.innerHTML = `

            <div style="
                background:#f8fafc;
                border-radius:24px;
                padding:2rem;
                border:1px solid #cbd5e1;
            ">
            
                <h3 style="
                    color:#2563eb;
                    margin-bottom:1rem;
                    font-size:1.5rem;
                ">
                    ${data.name}
                </h3>
            
                <p style="margin-bottom:0.5rem;">
                    <strong>Service:</strong>
                    ${data.service}
                </p>
            
                <p style="
                    margin-top:1rem;
                    font-weight:bold;
                    color:#16a34a;
                ">
                    ✅ Status: ${data.status}
                </p>

${data.status === "COMPLETED" && data.resultLink ? `

<div style="margin-top:1.5rem;">

    <strong style="
        display:block;
        margin-bottom:1rem;
    ">
        Laboratory Results
    </strong>

    ${data.resultLink
        .split("\n\n")
        .map(entry => {

            const lines = entry.split("\n");

            const fileName = lines[0];
            const fileUrl = lines[1];

            return `
                <a href="${fileUrl}"
                   target="_blank"
                   style="
                        display:block;
                        margin-bottom:1rem;
                        background:#2563eb;
                        color:white;
                        padding:1rem;
                        border-radius:16px;
                        text-align:center;
                        text-decoration:none;
                        font-weight:bold;
                   ">
                    📄 ${fileName}
                </a>
            `;

        }).join("")
    }

</div>

` : ""}
                
            </div>

        `;

    }

    else {

        resultBox.innerHTML = `

            <div style="
                background:#fef2f2;
                color:#dc2626;
                padding:1rem;
                border-radius:16px;
            ">
                ❌ Reference number not found.
            </div>

        `;

    }

}



document
.getElementById("checkStatusBtn")
.addEventListener("click", async () => {

    const reference =
        document.getElementById("referenceInput").value;

    const resultBox =
        document.getElementById("resultBox");

    resultBox.innerHTML = `

        <div style="
            text-align:center;
            color:#64748b;
            margin-top:1rem;
        ">
            Checking status...
        </div>

    `;

    try {

        const response =
            await fetch(
                "https://script.google.com/macros/s/AKfycby37SS_0mdKvGBh1Kv79jbUrh0n0wRbRLh9wTjbDxsp1fzr4jkNH-Elc9zRpDRbVso/exec?reference="
                + reference
            );

        const data =
            await response.json();

        handleResult(data);

    }

    catch(err){

        console.log(err);

        resultBox.innerHTML = `

            <div style="
                background:#fef2f2;
                color:#dc2626;
                padding:1rem;
                border-radius:16px;
            ">
                ❌ Failed to check status.
            </div>

        `;

    }

});

// AUTO QR TOKEN CHECK

window.addEventListener("load", async () => {

    const token =
        new URLSearchParams(
            window.location.search
        ).get("token");

    if(!token) return;

    document
        .getElementById("referenceInput")
        .style.display = "none";

    document
        .getElementById("checkStatusBtn")
        .style.display = "none";

    document
        .querySelector("label")
        .style.display = "none";

    const resultBox =
        document.getElementById("resultBox");

    resultBox.innerHTML = `
        <div style="
            text-align:center;
            color:#64748b;
        ">
            Loading laboratory result...
        </div>
    `;

    try{

        const response =
            await fetch(
                "https://script.google.com/macros/s/AKfycby37SS_0mdKvGBh1Kv79jbUrh0n0wRbRLh9wTjbDxsp1fzr4jkNH-Elc9zRpDRbVso/exec?token="
                + token
            );

        const data =
            await response.json();

        if(data.found){
            console.log(data);
            handleResult({
                found:true,
                name:data.name,
                service:"Laboratory Result",
                status:"COMPLETED",
                resultLink:data.resultLink
            });

        }

        else{

            resultBox.innerHTML = `
                <div style="
                    background:#fef2f2;
                    color:#dc2626;
                    padding:1rem;
                    border-radius:16px;
                ">
                    ❌ Invalid QR Code
                </div>
            `;

        }

    }

    catch(err){

        console.log(err);

    }

});    

    

</script>
</body>
</html>
